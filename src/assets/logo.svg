<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Heart icon with connection lines -->
  <g transform="translate(8, 8)">
    <!-- Left person dot -->
    <circle cx="8" cy="22" r="5" fill="#007AFF" opacity="0.7"/>
    <!-- Right person dot -->
    <circle cx="36" cy="22" r="5" fill="#FF3B80" opacity="0.7"/>
    <!-- Heart shape in center -->
    <path d="M22 18 C22 12, 14 10, 14 16 C14 20, 22 26, 22 26 C22 26, 30 20, 30 16 C30 10, 22 12, 22 18Z" fill="#007AFF"/>
    <!-- Connection lines -->
    <line x1="13" y1="22" x2="17" y2="20" stroke="#007AFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="31" y1="22" x2="27" y2="20" stroke="#FF3B80" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Text: 소개퐝 -->
  <text x="56" y="40" font-family="Pretendard, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#007AFF">소개</text>
  <text x="122" y="40" font-family="Pretendard, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#FF3B80">퐝</text>
  <!-- Subtitle -->
  <text x="160" y="40" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#94A3B8" letter-spacing="0.5">POHANG</text>
</svg>
